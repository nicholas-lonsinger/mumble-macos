name: Build

on:
  push:
    branches: '*'
  pull_request:
    branches: '*'
  workflow_dispatch:

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  CMAKE_OPTIONS: -Dtests=ON -Dsymbols=ON -Ddisplay-install-paths=ON -Dtest-lto=OFF -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache


jobs:
  build:
    strategy:
        fail-fast: false
        matrix:
            os: [macos-15]
            arch: [arm64]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
      with:
          submodules: 'recursive'
          fetch-depth: 1

    - uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ github.base_ref || github.ref_name }}.${{ matrix.os }}
        save: ${{ github.event_name != 'pull_request' }}
        append-timestamp: false

    - uses: ./.github/actions/install-dependencies

    - name: Build
      run: ./.github/workflows/build.sh "${{ matrix.arch }}"
      shell: bash

    - name: Test
      working-directory: ${{ github.workspace }}/build
      shell: bash
      run: ctest --output-on-failure -C $BUILD_TYPE

    - name: Publish
      uses: actions/upload-artifact@v6
      with:
        name: 'Mumble-${{ matrix.os }}'
        compression-level: 9
        path: |
          build/mumble
          build/Mumble.app
