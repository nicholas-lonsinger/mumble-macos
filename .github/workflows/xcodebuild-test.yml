name: Build & Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "::error::No Xcode 26.x found on runner"
            exit 1
          fi
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Cache SwiftPM and libopus build products
        uses: actions/cache@v4
        with:
          path: |
            DerivedData/SourcePackages
            DerivedData/Build/Intermediates.noindex
          key: ${{ runner.os }}-xcode-${{ hashFiles('Packages/COpus/**') }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project mumble-macos.xcodeproj \
            -scheme mumble-macos \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath DerivedData \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | xcbeautify --renderer github-actions

      - name: Test without building
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project mumble-macos.xcodeproj \
            -scheme mumble-macos \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath DerivedData \
            -resultBundlePath TestResults.xcresult \
            -skipPackagePluginValidation \
            -skip-testing:mumble-macosTests/MumbleAppImportCoordinatorTests \
            -skip-testing:mumble-macosTests/PKCS12EncoderTests \
            -skip-testing:mumble-macosTests/PasswordHandlingTests \
            -skip-testing:mumble-macosTests/ServerPasswordStoreTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | xcbeautify --renderer github-actions

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7
